# /etc/dpi-alert/dpi_detector.yml
# DPI scan detector config — Россия edition

log_file: "/var/log/nginx/stream-access.log"
reputation_db: "/var/lib/dpi-alert/reputation.json"

client:
  sni: "google.com" # Ваш камуфляж-домен
  backend: "vless:1080" # Ваш VLESS-бэкенд

thresholds:
  rate_window_sec: 60
  rate_threshold: 4
  tiny_bytes: 300
  correlation_window_sec: 5
  short_session_sec: 2.0
  pcap_score_threshold: 3
  burst_window_sec: 5
  burst_threshold: 10
  score_threshold: 4

nginx_detector:
  detect_half_handshake: true

graylist:
  enabled: true
  file: "/etc/nginx/graylist.conf"
  container: "nginx_stream"

suspicious_perfect:
  enabled: true
  log_file: "/var/log/dpi-alert/suspicious-perfect.log"

ru_connections:
  enabled: true
  log_file: "/var/log/dpi-alert/ru-connections.log"

pcap:
  dir: /var/log/tcpdump
  pattern: "tls-*.pcap"
  min_size_bytes: 24
  suspicious_windows:
    - 0
    - 512
    - 1024
    - 2048
    - 4096
  normal_mss_min: 1200
  normal_mss_max: 1460

# === Российские ASN (основные провайдеры и инфраструктура) ===
# Источники: RIPE NCC, bgp.he.net, ipinfo.io
# Обновлять: whois -h whois.ripe.net -- '-i origin AS12389'
allowed_asns:
  - "AS12389" # Rostelecom (крупнейший провайдер, ТСПУ)
  - "AS8359" # MTS Russia
  - "AS31133" # MegaFon
  - "AS3216" # VimpelCom / Beeline
  - "AS13094" # ER-Telecom / Dom.ru
  - "AS20485" # TransTeleCom
  - "AS35807" # SkyNet (Санкт-Петербург)
  - "AS42610" # NCNET
  - "AS47764" # VK / Mail.ru Group
  - "AS197695" # Yandex
  - "AS49505" # Selectel (cloud/CDN)
  - "AS200350" # Cloudflare Russia edge
  - "AS58271" # Internet Invest (ТСПУ-инфраструктура)

